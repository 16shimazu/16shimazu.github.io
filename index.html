<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }
        .profile {
            text-align: center;
        }
        h1, p {
            margin: 0.5em 0;
        }
    </style>
</head>
<body>
    <div class="profile">
        <h1>Name: sulfur</h1>
        <p id="time-ago">born: </p>
        <script>const birthdate = Math.floor(new Date('2008-06-18').getTime() / 1000);function timeAgo(timestamp) {const now = Math.floor(Date.now() / 1000);const differenceInSeconds = now - timestamp;const yearsAgo = Math.floor(differenceInSeconds / (365 * 24 * 60 * 60));return `${yearsAgo} years ago`;}document.getElementById("time-ago").textContent += timeAgo(birthdate);</script>
        <p>Pronouns: she/it</p>
        <p>Discord Username: sulfur.shimazu</p>
    </div>
</body>
</html>
